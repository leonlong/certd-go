<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL Certificate Manager</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🌐 SSL Manager</h1>
            </div>
            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="搜索证书...">
            </div>
            <div class="cert-list" id="certList">
                <div class="loading">加载中...</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2 id="contentTitle">添加证书</h2>
            </div>

            <div class="content-body" id="contentBody">
                <div class="form-card" id="addForm">
                    <form id="certForm">
                        <div class="form-group">
                            <label for="domain">域名</label>
                            <input type="text" id="domain" name="domain" placeholder="example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="altNames">SAN 域名</label>
                            <input type="text" id="altNames" name="altNames" placeholder="www.example.com, api.example.com (逗号分隔)">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dnsProvider">DNS 厂商</label>
                                <select id="dnsProvider" name="dnsProvider">
                                    <option value="">不设置</option>
                                    <option value="aliyun">阿里云</option>
                                    <option value="tencent">腾讯云</option>
                                    <option value="dnspod">DNSPod</option>
                                    <option value="cloudflare">Cloudflare</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="provider">CA 供应商</label>
                                <select id="provider" name="provider">
                                    <option value="letsencrypt">Let's Encrypt (免费)</option>
                                    <option value="ra">锐成 (RA)</option>
                                    <option value="trustasia">亚洲诚信</option>
                                    <option value="globalsign">GlobalSign</option>
                                    <option value="selfsigned">自签名</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="certType">证书类型</label>
                            <select id="certType" name="certType">
                                <option value="single">单域名</option>
                                <option value="wildcard">通配符 (*.domain.com)</option>
                                <option value="multidomain">多域名</option>
                            </select>
                        </div>

                        <div class="form-row" id="emailRow">
                            <div class="form-group">
                                <label for="email">邮箱 (Let's Encrypt 必填)</label>
                                <input type="email" id="email" name="email" placeholder="admin@example.com">
                            </div>
                        </div>

                        <div class="form-row hidden" id="apiRow">
                            <div class="form-group">
                                <label for="apiKey">API Key</label>
                                <input type="text" id="apiKey" name="apiKey" placeholder="">
                            </div>
                            <div class="form-group">
                                <label for="apiSecret">API Secret</label>
                                <input type="password" id="apiSecret" name="apiSecret" placeholder="">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">生成证书</button>
                            <button type="button" class="btn btn-secondary" onclick="showAddForm()">清空</button>
                        </div>
                    </form>
                </div>

                <div class="detail-card hidden" id="detailView">
                    <div class="detail-header">
                        <h3 id="detailDomain">example.com</h3>
                        <span class="badge" id="detailStatus">有效</span>
                    </div>

                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>有效期</label>
                            <span id="detailValidity">2024-01-01 ~ 2025-01-01 (365天)</span>
                        </div>
                        <div class="detail-item">
                            <label>开始时间</label>
                            <span id="detailNotBefore">2024-01-01</span>
                        </div>
                        <div class="detail-item">
                            <label>结束时间</label>
                            <span id="detailNotAfter">2025-01-01</span>
                        </div>
                        <div class="detail-item">
                            <label>CA 供应商</label>
                            <span id="detailProvider">Let's Encrypt</span>
                        </div>
                        <div class="detail-item">
                            <label>DNS 厂商</label>
                            <span id="detailDNSProvider">-</span>
                        </div>
                        <div class="detail-item">
                            <label>证书类型</label>
                            <span id="detailCertType">DV</span>
                        </div>
                        <div class="detail-item">
                            <label>序列号</label>
                            <span id="detailSerial" class="mono">-</span>
                        </div>
                        <div class="detail-item">
                            <label>Fingerprint</label>
                            <span id="detailFingerprint" class="mono">-</span>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h4>管理信息</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="editProject">应用项目</label>
                                <input type="text" id="editProject" placeholder="项目名称">
                            </div>
                            <div class="form-group">
                                <label for="editOwner">业务负责人</label>
                                <input type="text" id="editOwner" placeholder="负责人">
                            </div>
                            <div class="form-group">
                                <label for="editNotes">备注</label>
                                <input type="text" id="editNotes" placeholder="备注信息">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-primary" onclick="saveCert()">保存</button>
                            <button type="button" class="btn btn-danger" onclick="deleteCert()">删除</button>
                        </div>
                    </div>

                    <div class="detail-actions">
                        <button type="button" class="btn btn-secondary" onclick="downloadCert()">下载证书</button>
                        <button type="button" class="btn btn-secondary" onclick="renewCert()">续期</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/app.js"></script>
</body>
</html>
